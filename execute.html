<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b1a2e">
    <title>بنيان - خدمات التنفيذ</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        (function() {
            var saved = localStorage.getItem('bunean-theme');
            var prefers = window.matchMedia('(prefers-color-scheme: light)').matches;
            if (saved === 'light' || (!saved && prefers)) {
                document.documentElement.classList.add('light-mode');
            }
        })();
    </script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="js/header.js"></script>
    <script src="js/bottom-nav.js"></script>
</head>
<body>
    <div id="app">
        <div class="app-container">
            <div id="header"></div>

            <div class="page-content">
                <!-- رأس الصفحة -->
                <div style="padding:16px;">
                    <h1 style="font-size:22px;font-weight:800;color:#fff;margin-bottom:4px;">خدمات التنفيذ</h1>
                    <p style="font-size:13px;color:#8a9bb0;">اختر الخدمة المناسبة لمشروعك</p>
                </div>

                <!-- البحث -->
                <div style="padding:0 16px 12px;">
                    <div class="search-bar" style="margin:0;">
                        <input type="text" v-model="searchQuery" placeholder="ابحث عن خدمة...">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                    </div>
                </div>

                <!-- التصنيفات -->
                <div class="market-categories">
                    <div v-for="(cat, index) in categories" :key="index"
                         class="market-cat-item"
                         :class="{ active: activeCategory === index }"
                         @click="activeCategory = index">
                        <div class="cat-icon" v-html="cat.icon"></div>
                        <span class="cat-label">{{ cat.name }}</span>
                    </div>
                </div>

                <!-- قائمة الخدمات -->
                <div style="padding:0 16px;">
                    <div v-for="(service, index) in filteredServices" :key="index" class="offer-card" style="margin-bottom:12px;">
                        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
                            <div style="width:52px;height:52px;background:rgba(201,162,67,0.12);border-radius:14px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(201,162,67,0.2);">
                                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#c9a243" stroke-width="2">
                                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                                    <polyline points="9 22 9 12 15 12 15 22"/>
                                </svg>
                            </div>
                            <div>
                                <div style="font-size:16px;font-weight:700;color:#fff;">{{ service.name }}</div>
                                <div style="font-size:12px;color:#8a9bb0;">{{ service.desc }}</div>
                            </div>
                        </div>
                        <div style="display:flex;align-items:center;justify-content:space-between;">
                            <div style="font-size:14px;color:#c9a243;font-weight:600;">{{ service.price }}</div>
                            <a href="quotes.html" class="btn-primary btn-small" style="text-decoration:none;width:auto;">طلب عرض سعر</a>
                        </div>
                    </div>
                </div>
            </div>

            <div id="bottomNav"></div>
        </div>
    </div>

    <script src="js/nav.js"></script>
    <script>
        document.getElementById('header').innerHTML = renderHeader();
        document.getElementById('bottomNav').innerHTML = renderNav('execute');

        const { createApp, ref, computed } = Vue;

        createApp({
            setup() {
                initTheme();
                const searchQuery = ref('');
                const activeCategory = ref(0);

                const categories = ref([
                    { name: 'بناء', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>' },
                    { name: 'تشطيبات', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>' },
                    { name: 'كهرباء', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg>' },
                    { name: 'سباكة', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>' },
                    { name: 'دهانات', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M12 19a7 7 0 1 0 0-14 7 7 0 0 0 0 14zm0 0v5"/></svg>' },
                    { name: 'أعمال يدوية', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>' }
                ]);

                const services = ref([
                    { name: 'بناء فلل سكنية', desc: 'بناء فلل كاملة من الأساس حتى التسليم', price: 'تبدأ من 50,000,000 د.ع', category: 'بناء' },
                    { name: 'تشطيبات داخلية', desc: 'أعمال الجبس والسيراميك والدهانات', price: 'تبدأ من 10,000,000 د.ع', category: 'تشطيبات' },
                    { name: 'أعمال كهربائية', desc: 'تأسيس وتشطيب أعمال الكهرباء', price: 'تبدأ من 5,000,000 د.ع', category: 'كهرباء' },
                    { name: 'أعمال سباكة', desc: 'تأسيس وتشطيب أعمال السباكة', price: 'تبدأ من 3,000,000 د.ع', category: 'سباكة' },
                    { name: 'أعمال الدهانات', desc: 'دهانات داخلية وخارجية بأحدث التصاميم', price: 'تبدأ من 2,000,000 د.ع', category: 'دهانات' }
                ]);

                const filteredServices = computed(() => {
                    const catName = categories.value[activeCategory.value].name;
                    return services.value.filter(s => s.category === catName);
                });

                return { searchQuery, activeCategory, categories, filteredServices };
            }
        }).mount('#app');
    </script>
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('SW registered'))
                .catch(err => console.log('SW registration failed'));
        }
    </script>
</body>
</html>
