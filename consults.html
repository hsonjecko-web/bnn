<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b1a2e">
    <title>بنيان - الاستشارات</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        (function() {
            var saved = localStorage.getItem('bunean-theme');
            var prefers = window.matchMedia('(prefers-color-scheme: light)').matches;
            if (saved === 'light' || (!saved && prefers)) {
                document.documentElement.classList.add('light-mode');
            }
        })();
    </script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="js/header.js"></script>
    <script src="js/bottom-nav.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        .notif-tab { padding:6px 16px; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; background:rgba(255,255,255,0.12); color:#c8d6e5; white-space:nowrap; font-family:Cairo,sans-serif; border:1px solid rgba(255,255,255,0.15); }
        .notif-tab.zactive { background:#c9a243; color:#0a1628; border-color:#c9a243; font-weight:700; }
        html.light-mode .notif-tab { background:rgba(44,95,138,0.08); color:#2c5f8a; border-color:rgba(44,95,138,0.2); }
        .notif-card { background:var(--bg-card); border:1px solid var(--border-light); border-radius:14px; padding:14px; cursor:pointer; transition:all .2s; display:flex; gap:12px; align-items:flex-start; }
        .notif-card:active { opacity:.8; }
        .notif-overlay { position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; padding:20px; }
        .notif-modal { background:var(--bg-card); border:1px solid var(--border-light); border-radius:16px; width:100%; max-width:380px; max-height:80vh; overflow-y:auto; padding:0; direction:rtl; }
        @media (max-width:430px) { .notif-tab { padding:6px 12px; font-size:11px; } }
    </style>
</head>
<body>
    <div id="app">
        <div class="app-container">
            <div id="header"></div>
            <div class="page-content" style="padding-right:0;padding-left:0;display:flex;flex-direction:column;">

                <!-- Back + Tabs row -->
                <div style="display:flex;align-items:center;gap:6px;padding:12px 16px 12px;border-bottom:1px solid var(--border-light);">
                    <button onclick="window.history.back()" style="flex-shrink:0;width:32px;height:32px;border:none;border-radius:8px;background:var(--bg-input);color:var(--text-white);display:flex;align-items:center;justify-content:center;cursor:pointer;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                    </button>
                    <div style="display:flex;gap:6px;overflow-x:auto;flex:1;">
                        <button class="notif-tab" data-tab="all" @click="switchTab('all')">الكل</button>
                        <button class="notif-tab" data-tab="pending" @click="switchTab('pending')">قيد المراجعة</button>
                        <button class="notif-tab" data-tab="replied" @click="switchTab('replied')">تم الرد</button>
                        <button class="notif-tab" data-tab="cancelled" @click="switchTab('cancelled')">ملغي</button>
                    </div>
                </div>

                <!-- Consults List -->
                <div v-if="filtered.length" style="flex:1;padding:20px 16px 16px;display:flex;flex-direction:column;gap:10px;">
                    <div v-for="c in filtered" :key="c.id" class="notif-card" @click="openConsult(c)">
                        <div class="notif-icon" :style="{ background: iconBg(c.status) }">
                            <span class="material-symbols-outlined" style="font-size:20px;color:#fff;">{{ iconName(c.status) }}</span>
                        </div>
                        <div style="flex:1;min-width:0;">
                            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px;">
                                <span style="color:var(--text-white);font-size:13px;font-weight:600;line-height:1.3;">{{ c.consultType || 'استشارة' }}</span>
                                <span style="color:var(--text-muted);font-size:10px;flex-shrink:0;">{{ c.timeAgo }}</span>
                            </div>
                            <p style="color:var(--text-muted);font-size:12px;margin:4px 0 0;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">{{ c.desc }}</p>
                            <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;">
                                <span :style="statusBadge(c.status)" style="font-size:10px;padding:2px 8px;border-radius:12px;font-weight:600;">{{ c.status }}</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div v-else style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;">
                    <span class="material-symbols-outlined" style="font-size:48px;color:var(--text-muted);opacity:.4;">engineering</span>
                    <p style="color:var(--text-muted);font-size:14px;margin-top:12px;">لا توجد استشارات</p>
                </div>

            </div>
            <div id="bottomNav"></div>
        </div>
    </div>

    <script src="js/nav.js"></script>
    <script>
        initTheme();
        document.getElementById('header').innerHTML = renderHeader({ title: 'الاستشارات' });
        document.getElementById('bottomNav').innerHTML = renderNav('account');

        const { createApp, ref, computed } = Vue;

        createApp({
            setup() {
                initTheme();

                var activeTab = ref('all');

                function timeAgo(iso) {
                    if (!iso) return '';
                    var diff = Date.now() - new Date(iso).getTime();
                    var mins = Math.floor(diff / 60000);
                    if (mins < 60) return 'منذ ' + mins + ' دقيقة';
                    var hrs = Math.floor(mins / 60);
                    if (hrs < 24) return 'منذ ' + hrs + ' ساعة';
                    var days = Math.floor(hrs / 24);
                    return 'منذ ' + days + ' يوم';
                }

                function statusBadge(s) {
                    if (s === 'تم الرد') return { background:'rgba(201,162,67,0.15)', color:'var(--accent-gold)' };
                    if (s === 'مقبول') return { background:'rgba(46,204,113,0.15)', color:'#2ecc71' };
                    if (s === 'ملغي') return { background:'rgba(231,76,60,0.15)', color:'#e74c3c' };
                    return { background:'rgba(79,195,247,0.15)', color:'#4fc3f7' };
                }

                var consults = computed(function() {
                    var all = JSON.parse(localStorage.getItem('bunean-service-requests') || '[]');
                    return all.filter(function(r) { return r.submitType === 'consult'; }).map(function(r) {
                        return {
                            id: r.id,
                            consultType: r.consultType || 'استشارة',
                            desc: r.desc,
                            status: r.status || 'قيد المراجعة',
                            reply: r.reply || '',
                            timeAgo: timeAgo(r.createdAt),
                            name: r.name,
                            phone: r.phone,
                            gov: r.gov,
                            images: r.images || [],
                            createdAt: r.createdAt
                        };
                    }).reverse();
                });

                var filtered = computed(function() {
                    if (activeTab.value === 'all') return consults.value;
                    var statusMap = { pending: 'قيد المراجعة', replied: 'تم الرد', cancelled: 'ملغي' };
                    return consults.value.filter(function(c) { return c.status === statusMap[activeTab.value]; });
                });

                function iconName(s) {
                    if (s === 'تم الرد') return 'check_circle';
                    if (s === 'ملغي') return 'cancel';
                    if (s === 'مقبول') return 'thumb_up';
                    return 'hourglass_empty';
                }

                function iconBg(s) {
                    if (s === 'تم الرد') return 'var(--accent-gold)';
                    if (s === 'مقبول') return '#2ecc71';
                    if (s === 'ملغي') return '#e74c3c';
                    return '#4fc3f7';
                }

                function openConsult(c) {
                    var overlay = document.createElement('div');
                    overlay.className = 'notif-overlay';
                    overlay.setAttribute('onclick', 'this.remove()');
                    var modal = document.createElement('div');
                    modal.className = 'notif-modal';
                    modal.setAttribute('onclick', 'event.stopPropagation()');
                    var replyHtml = c.reply
                        ? '<div style="background:var(--bg-input);border-radius:12px;padding:14px;margin-top:12px;border-right:3px solid var(--accent-gold);"><p style="color:var(--text-muted);font-size:11px;margin:0 0 4px;">الرد:</p><p style="color:var(--text-white);font-size:13px;line-height:1.7;margin:0;">' + c.reply + '</p></div>'
                        : '';
                    var imagesHtml = (c.images && c.images.length)
                        ? '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;">' + c.images.map(function(img) { return '<img src="' + img + '" style="width:60px;height:60px;border-radius:8px;object-fit:cover;border:1px solid var(--border-light);">'; }).join('') + '</div>'
                        : '';
                    modal.innerHTML =
                        '<div style="padding:20px 16px;text-align:center;border-bottom:1px solid var(--border-light);">'
                        + '<div style="width:48px;height:48px;border-radius:14px;background:#4fc3f7;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;"><span class="material-symbols-outlined" style="font-size:24px;color:#fff;">engineering</span></div>'
                        + '<h3 style="color:var(--text-white);font-size:16px;font-weight:700;margin:0;">' + c.consultType + '</h3>'
                        + '<p style="color:var(--text-muted);font-size:11px;margin:4px 0 0;">' + c.timeAgo + '</p>'
                        + '</div>'
                        + '<div style="padding:16px;">'
                        + '<div style="background:var(--bg-input);border-radius:12px;padding:14px;margin-bottom:12px;">'
                        + '<div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span style="color:var(--text-muted);font-size:12px;">الاسم</span><span style="color:var(--text-white);font-size:13px;font-weight:600;">' + c.name + '</span></div>'
                        + '<div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span style="color:var(--text-muted);font-size:12px;">الهاتف</span><span style="color:var(--text-white);font-size:13px;font-weight:600;" dir="ltr" style="text-align:left;">' + c.phone + '</span></div>'
                        + (c.gov ? '<div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span style="color:var(--text-muted);font-size:12px;">المحافظة</span><span style="color:var(--text-white);font-size:13px;font-weight:600;">' + c.gov + '</span></div>' : '')
                        + '<div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span style="color:var(--text-muted);font-size:12px;">الحالة</span><span :style="' + JSON.stringify(statusBadge(c.status)) + '" style="font-size:12px;padding:2px 10px;border-radius:12px;font-weight:600;">' + c.status + '</span></div>'
                        + '</div>'
                        + '<p style="color:var(--text-white);font-size:13px;line-height:1.7;margin:0;">' + c.desc + '</p>'
                        + imagesHtml
                        + replyHtml
                        + '</div>'
                        + '<div style="padding:0 16px 16px;">'
                        + '<button onclick="this.closest(\'.notif-overlay\').remove()" style="width:100%;padding:10px;border:none;border-radius:12px;background:var(--accent-gold);color:var(--primary-dark);font-size:13px;font-weight:700;font-family:Cairo,sans-serif;cursor:pointer;">إغلاق</button>'
                        + '</div>';
                    overlay.appendChild(modal);
                    document.body.appendChild(overlay);
                }

                function switchTab(t) {
                    activeTab.value = t;
                    document.querySelectorAll('.notif-tab').forEach(function(el) {
                        el.classList.toggle('zactive', el.dataset.tab === t);
                    });
                }

                Vue.onMounted(function() {
                    document.querySelectorAll('.notif-tab').forEach(function(el) {
                        el.classList.toggle('zactive', el.dataset.tab === activeTab.value);
                    });
                });

                return { activeTab, consults, filtered, iconName, iconBg, openConsult, switchTab, statusBadge };
            }
        }).mount('#app');

        initFloatingCart();
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(function() { console.log('SW registered'); })
                .catch(function(err) { console.log('SW registration failed'); });
        }
    </script>
</body>
</html>
