<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b1a2e">
    <title>بنيان - سوق البضائع</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        (function() {
            var saved = localStorage.getItem('bunean-theme');
            var prefers = window.matchMedia('(prefers-color-scheme: light)').matches;
            if (saved === 'light' || (!saved && prefers)) {
                document.documentElement.classList.add('light-mode');
            }
        })();
    </script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="js/header.js"></script>
    <script src="js/bottom-nav.js"></script>
</head>
<body>
    <div id="app">
        <div class="app-container">
            <div id="header"></div>

            <div class="page-content">
                <!-- البحث -->
                <div style="padding:12px 16px;">
                    <div class="search-bar" style="margin:0;">
                        <input type="text" v-model="searchQuery" placeholder="ابحث عن منتجات البناء...">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                    </div>
                </div>

                <!-- التصنيفات -->
                <div class="market-categories">
                    <div v-for="(cat, index) in categories" :key="index"
                         class="market-cat-item"
                         :class="{ active: activeCategory === index }"
                         @click="activeCategory = index">
                        <div class="cat-icon" v-html="cat.icon"></div>
                        <span class="cat-label">{{ cat.name }}</span>
                    </div>
                </div>

                <!-- إعلان مميز -->
                <div class="banner" style="margin:16px;">
                    <div class="banner-title">عروض نهاية الموسم</div>
                    <div class="banner-desc">خصم يصل إلى 30% على جميع أنواع الدهانات</div>
                    <button class="banner-btn">تسوق الآن</button>
                </div>

                <!-- المنتجات الأكثر مبيعاً -->
                <div class="section-header">
                    <span class="section-title">الأكثر مبيعاً</span>
                    <span class="section-link">عرض الكل</span>
                </div>
                <div class="products-grid">
                    <a v-for="(product, index) in products" :key="index"
                       :href="product.link" class="product-card" style="text-decoration:none;">
                        <div class="product-image" :style="{ background: product.bg }">
                            <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#c9a243" stroke-width="1.5">
                                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                                </svg>
                            </div>
                        </div>
                        <div class="product-name">{{ product.name }}</div>
                        <div class="product-price">{{ product.price }}</div>
                        <button class="product-cart-btn" @click.prevent="addToCart(product)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"/>
                                <line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                        </button>
                    </a>
                </div>

                <!-- الموردون -->
                <div class="section-header">
                    <span class="section-title">موردون مميزون</span>
                    <span class="section-link">عرض الكل</span>
                </div>
                <div style="padding:0 16px 16px;">
                    <div v-for="(supplier, index) in suppliers" :key="index" class="offer-card">
                        <div class="offer-header">
                            <div class="offer-company">
                                <div class="offer-logo">{{ supplier.initial }}</div>
                                <div>
                                    <div class="offer-name">{{ supplier.name }}</div>
                                    <div class="offer-rating">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="#c9a243" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                                        {{ supplier.rating }}
                                    </div>
                                </div>
                            </div>
                        </div>
                        <p style="font-size:13px;color:#8a9bb0;margin-bottom:12px;">{{ supplier.desc }}</p>
                        <button class="btn-primary btn-small" style="width:auto;">عرض المنتجات</button>
                    </div>
                </div>
            </div>

            <div id="bottomNav"></div>
        </div>
    </div>

    <script src="js/nav.js"></script>
    <script>
        document.getElementById('header').innerHTML = renderHeader({ cartBadge: true });
        document.getElementById('bottomNav').innerHTML = renderNav('market');

        const { createApp, ref, computed } = Vue;

        createApp({
            setup() {
                initTheme();
                const searchQuery = ref('');
                const activeCategory = ref(0);
                const cartCount = ref(2);
                const cart = ref([]);

                const categories = ref([
                    { name: 'دهانات', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>' },
                    { name: 'سيراميك', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>' },
                    { name: 'جبس', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' },
                    { name: 'إسمنت', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>' },
                    { name: 'أدوات', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>' },
                    { name: 'أرضيات', icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>' }
                ]);

                const products = ref([
                    { name: 'دهان جوتن للجدران', price: '45,000 د.ع', bg: 'linear-gradient(135deg, #f5f5f5, #e0e0e0)', link: 'product.html' },
                    { name: 'بلاط سيراميك 60x60', price: '12,000 د.ع', bg: 'linear-gradient(135deg, #f5f5f5, #e0e0e0)', link: 'product.html' },
                    { name: 'إسمنت أخضر 50 كجم', price: '18,000 د.ع', bg: 'linear-gradient(135deg, #f5f5f5, #e0e0e0)', link: 'product.html' },
                    { name: 'طقم أدوات كهربائية', price: '95,000 د.ع', bg: 'linear-gradient(135deg, #f5f5f5, #e0e0e0)', link: 'product.html' }
                ]);

                const suppliers = ref([
                    { name: 'مؤسسة البناء للأدوات', initial: 'م', rating: '4.6', desc: 'جميع أنواع مواد البناء والأدوات الكهربائية واليدوية' }
                ]);

                const addToCart = (product) => {
                    cart.value.push(product);
                    cartCount.value = cart.value.length;
                    alert('تمت الإضافة للسلة!');
                };

                return { searchQuery, activeCategory, cartCount, categories, products, suppliers, addToCart };
            }
        }).mount('#app');
    </script>
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('SW registered'))
                .catch(err => console.log('SW registration failed'));
        }
    </script>
</body>
</html>
