<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b1a2e">
    <title>بنيان - طلب خدمة</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        (function() {
            var saved = localStorage.getItem('bunean-theme');
            var prefers = window.matchMedia('(prefers-color-scheme: light)').matches;
            if (saved === 'light' || (!saved && prefers)) {
                document.documentElement.classList.add('light-mode');
            }
        })();
    </script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="js/header.js"></script>
    <script src="js/bottom-nav.js"></script>
    <script src="js/router.js"></script>
</head>
<body>
    <div id="app">
        <div class="app-container">
            <div id="header"></div>

            <div class="page-content" style="padding:16px;">
                <!-- نوع الخدمة -->
                <div class="form-group">
                    <label class="form-label">
                        نوع الخدمة
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
                        </svg>
                    </label>
                    <select class="form-select" v-model="form.serviceType">
                        <option value="">اختر نوع الخدمة</option>
                        <option v-for="service in serviceTypes" :key="service.value" :value="service.value">{{ service.label }}</option>
                    </select>
                </div>

                <!-- عنوان المشروع -->
                <div class="form-group">
                    <label class="form-label">
                        عنوان المشروع
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                            <circle cx="12" cy="10" r="3"/>
                        </svg>
                    </label>
                    <input type="text" class="form-input" placeholder="أدخل عنوان المشروع" v-model="form.projectTitle">
                </div>

                <!-- وصف المشروع -->
                <div class="form-group">
                    <label class="form-label">
                        وصف المشروع
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                        </svg>
                    </label>
                    <textarea class="form-textarea" placeholder="اوصف مشروعك بالتفصيل..." v-model="form.projectDesc"></textarea>
                </div>

                <!-- المدينة -->
                <div class="form-group">
                    <label class="form-label">
                        المدينة
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                            <circle cx="12" cy="10" r="3"/>
                        </svg>
                    </label>
                    <select class="form-select" v-model="form.city">
                        <option value="">اختر المدينة</option>
                        <option v-for="city in cities" :key="city.value" :value="city.value">{{ city.label }}</option>
                    </select>
                </div>

                <!-- الميزانية التقديرية -->
                <div class="form-group">
                    <label class="form-label">
                        الميزانية التقديرية
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="1" x2="12" y2="23"/>
                            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                        </svg>
                    </label>
                    <input type="text" class="form-input" placeholder="أدخل الميزانية التقديرية" v-model="form.budget">
                </div>

                <!-- الصور -->
                <div class="form-group">
                    <label class="form-label">
                        صور إضافية (اختياري)
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                    </label>
                    <div style="border:2px dashed rgba(255,255,255,0.15);border-radius:12px;padding:24px;text-align:center;cursor:pointer;" @click="addImages">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#5a7088" stroke-width="1.5" style="margin:0 auto 8px;">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                        <p style="color:#5a7088;font-size:13px;">اضغط لإضافة صور</p>
                        <p v-if="form.images.length > 0" style="color:#c9a243;font-size:12px;margin-top:4px;">{{ form.images.length }} صور محددة</p>
                    </div>
                </div>

                <!-- زر الإرسال -->
                <button class="btn-primary" style="margin-top:20px;" @click="submitRequest" :disabled="!isFormValid">
                    {{ isSubmitting ? 'جاري الإرسال...' : 'إرسال طلب الخدمة' }}
                </button>
            </div>

            <div id="bottomNav"></div>
        </div>
    </div>

    <script src="js/nav.js"></script>
    <script>
        document.getElementById('header').innerHTML = renderHeader({ showBack: true, backLink: 'home.html' });
        document.getElementById('bottomNav').innerHTML = renderNav('execute');

        const { createApp, ref, computed } = Vue;

        createApp({
            setup() {
                initTheme();
                const isSubmitting = ref(false);

                const form = ref({
                    serviceType: '',
                    projectTitle: '',
                    projectDesc: '',
                    city: '',
                    budget: '',
                    images: []
                });

                const serviceTypes = ref([
                    { value: 'construction', label: 'بناء' },
                    { value: 'decoration', label: 'ديكور' },
                    { value: 'electricity', label: 'كهرباء' },
                    { value: 'plumbing', label: 'سباكة' },
                    { value: 'painting', label: 'دهانات' }
                ]);

                const cities = ref([
                    { value: 'baghdad', label: 'بغداد' },
                    { value: 'basra', label: 'البصرة' },
                    { value: 'erbil', label: 'أربيل' },
                    { value: 'mosul', label: 'الموصل' },
                    { value: 'sulaymaniyah', label: 'السليمانية' }
                ]);

                const isFormValid = computed(() => {
                    return form.value.serviceType && form.value.projectTitle && form.value.projectDesc && form.value.city;
                });

                const addImages = () => {
                    form.value.images.push('image_' + (form.value.images.length + 1));
                };

                const submitRequest = () => {
                    if (!isFormValid.value) return;
                    isSubmitting.value = true;
                    setTimeout(() => {
                        isSubmitting.value = false;
                        showBrandAlert('تم إرسال طلب الخدمة بنجاح!');
                        form.value = { serviceType: '', projectTitle: '', projectDesc: '', city: '', budget: '', images: [] };
                    }, 1500);
                };

                return { form, serviceTypes, cities, isFormValid, isSubmitting, addImages, submitRequest };
            }
        }).mount('#app');
    </script>
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('SW registered'))
                .catch(err => console.log('SW registration failed'));
        }
    </script>
</body>
</html>
