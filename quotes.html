<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b1a2e">
    <title>بنيان - استشارات</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        (function() {
            var saved = localStorage.getItem('bunean-theme');
            var prefers = window.matchMedia('(prefers-color-scheme: light)').matches;
            if (saved === 'light' || (!saved && prefers)) {
                document.documentElement.classList.add('light-mode');
            }
        })();
    </script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="js/header.js"></script>
    <script src="js/bottom-nav.js"></script>
</head>
<body>
    <div id="app">
        <div class="app-container">
            <div id="header"></div>

            <div class="page-content">
                <div style="padding: 20px 16px;">
                    <h1 style="font-size: 22px; font-weight: 800; color: var(--text-white); margin-bottom: 4px;">طلب استشارة</h1>
                    <p style="font-size: 13px; color: var(--text-light);">املأ البيانات وسيتواصل معك المختصون</p>
                </div>

                <div style="padding: 0 16px 20px;">
                    <div class="form-inline">
                        <label class="form-inline-label">
                            <span class="material-symbols-outlined">person</span>
                            الاسم
                        </label>
                        <input type="text" class="form-input" v-model="form.name" placeholder="الاسم">
                    </div>

                    <div class="form-inline">
                        <label class="form-inline-label">
                            <span class="material-symbols-outlined">call</span>
                            الهاتف
                        </label>
                        <input type="tel" class="form-input" v-model="form.phone" placeholder="رقم الهاتف">
                    </div>

                    <div class="form-inline">
                        <label class="form-inline-label">
                            <span class="material-symbols-outlined">location_city</span>
                            المحافظة
                        </label>
                        <select class="form-select" v-model="form.gov">
                            <option value="">اختر</option>
                            <option v-for="g in governorates" :key="g" :value="g">{{ g }}</option>
                        </select>
                    </div>

                    <div class="form-inline">
                        <label class="form-inline-label">
                            <span class="material-symbols-outlined">category</span>
                            نوع الاستشارة
                        </label>
                        <select class="form-select" v-model="form.type">
                            <option value="">اختر</option>
                            <option value="هندسية">هندسية</option>
                            <option value="تصميم داخلي">تصميم داخلي</option>
                            <option value="تشطيبات">تشطيبات</option>
                            <option value="مواد بناء">مواد بناء</option>
                            <option value="قانونية">قانونية</option>
                            <option value="أخرى">أخرى</option>
                        </select>
                    </div>

                    <div class="form-inline">
                        <label class="form-inline-label">
                            <span class="material-symbols-outlined">map</span>
                            العنوان
                        </label>
                        <input type="text" class="form-input" v-model="form.address" placeholder="العنوان">
                    </div>

                    <div class="form-inline" style="align-items: flex-start;">
                        <label class="form-inline-label" style="padding-top: 8px;">
                            <span class="material-symbols-outlined">description</span>
                            التفاصيل
                        </label>
                        <textarea class="form-textarea" v-model="form.desc" placeholder="اكتب تفاصيل استشارتك هنا..." style="min-height: 110px;"></textarea>
                    </div>

                    <button class="btn-primary" @click="submitForm" style="margin-top: 12px;">
                        <span class="material-symbols-outlined" style="vertical-align: middle; font-size: 20px; margin-left: 6px;">send</span>
                        إرسال الاستشارة
                    </button>
                </div>
            </div>

            <div id="bottomNav"></div>
        </div>
    </div>

    <script src="js/nav.js"></script>
    <script>
        document.getElementById('header').innerHTML = renderHeader({ showBack: true, backLink: 'home.html' });
        document.getElementById('bottomNav').innerHTML = renderNav('home');

        const { createApp, ref } = Vue;

        createApp({
            setup() {
                initTheme();

                var governorates = ref(['بغداد', 'البصرة', 'نينوى', 'أربيل', 'كركوك', 'النجف', 'كربلاء', 'السليمانية']);

                var form = ref({
                    name: '',
                    gov: '',
                    address: '',
                    phone: '',
                    type: '',
                    desc: ''
                });

                function submitForm() {
                    if (!form.value.name.trim()) { alert('يرجى إدخال الاسم'); return; }
                    if (!form.value.gov) { alert('يرجى اختيار المحافظة'); return; }
                    if (!form.value.phone.trim()) { alert('يرجى إدخال رقم الهاتف'); return; }
                    if (!form.value.type) { alert('يرجى اختيار نوع الاستشارة'); return; }
                    if (!form.value.desc.trim()) { alert('يرجى كتابة تفاصيل الاستشارة'); return; }

                    alert('تم ارسال الاستشارة\nانتظر الرد من المختصين');
                    form.value = { name: '', gov: '', address: '', phone: '', type: '', desc: '' };
                }

                return { form, governorates, submitForm };
            }
        }).mount('#app');

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(function() { console.log('SW registered'); })
                .catch(function(err) { console.log('SW registration failed'); });
        }
    </script>
</body>
</html>
