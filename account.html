<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b1a2e">
    <title>بنيان - حسابي</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        (function() {
            var saved = localStorage.getItem('bunean-theme');
            var prefers = window.matchMedia('(prefers-color-scheme: light)').matches;
            if (saved === 'light' || (!saved && prefers)) {
                document.documentElement.classList.add('light-mode');
            }
        })();
    </script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="js/header.js"></script>
    <script src="js/bottom-nav.js"></script>
    <script src="js/router.js"></script>
    <style>
        .section-title { color: var(--accent-gold); font-size: 15px; font-weight: 700; margin: 20px 16px 10px; }
        .section-card { background: var(--bg-card); border-radius: 14px; margin: 0 16px 12px; padding: 16px; }
        .spec-tag { display:inline-block; padding:3px 10px; border-radius:50px; font-size:11px; background:rgba(255,136,0,0.1); color:#FF8800; border:1px solid rgba(255,136,0,0.2); margin:2px; }
        .status-badge { display:inline-block; padding:3px 12px; border-radius:50px; font-size:11px; font-weight:600; }
        .img-preview { width:60px; height:60px; border-radius:8px; overflow:hidden; flex-shrink:0; background:var(--bg-input); display:flex; align-items:center; justify-content:center; border:1px solid var(--border-light); }
        .img-preview img { width:100%; height:100%; object-fit:cover; }
        .mkt-detail-row { display:flex; align-items:center; justify-content:space-between; padding:6px 0; }
        .mkt-detail-label { color:var(--text-muted); font-size:12px; }
        .mkt-detail-value { color:var(--text-white); font-size:13px; }
        .notif-overlay { position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; padding:20px; }
        .notif-modal { background:var(--bg-card); border:1px solid var(--border-light); border-radius:16px; width:100%; max-width:380px; max-height:80vh; overflow-y:auto; padding:0; direction:rtl; position:relative; }
    </style>
</head>
<body>
    <div id="app">
        <div class="app-container">
            <div id="header"></div>

            <div class="page-content">

                <!-- ===== الملف الشخصي + القائمة (تختفي عند فتح قسم) ===== -->
                <template v-if="!activeUserSection">
                    <!-- الملف الشخصي -->
                    <div class="profile-section">
                        <div class="profile-avatar">{{ user.name.charAt(0) }}</div>
                        <div class="profile-name">{{ user.name }}</div>
                        <div v-if="isCompany" class="status-badge" style="background:rgba(255,136,0,0.1);color:#FF8800;border:1px solid rgba(255,136,0,0.2);font-size:11px;margin:4px auto 0;width:fit-content;">{{ companyStatus }}</div>
                        <div class="profile-phone-row">
                            <a :href="'tel:' + user.phone" class="profile-phone">{{ user.phone }}</a>
                        </div>
                        <div v-if="user.governorate || user.address" class="profile-info-row">
                            <span v-if="user.governorate" class="profile-info-tag">
                                <span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle;">location_on</span>
                                {{ user.governorate }}
                            </span>
                            <span v-if="user.address" class="profile-info-tag">
                                <span class="material-symbols-outlined" style="font-size:14px;vertical-align:middle;">home</span>
                                {{ user.address }}
                            </span>
                        </div>
                    </div>

                    <!-- القائمة -->
                    <div class="menu-section">
                        <template v-for="(item, index) in menuItems" :key="index">
                            <a v-if="!item.section" :href="item.link" class="menu-item">
                                <div class="menu-item-left">
                                    <div class="menu-item-icon" v-html="item.icon"></div>
                                    <span class="menu-item-label" :style="{ color: item.color || '' }">{{ item.label }}</span>
                                </div>
                                <svg class="menu-item-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                            </a>
                            <div v-else class="menu-item" @click="activeUserSection = item.section" style="cursor:pointer;">
                                <div class="menu-item-left">
                                    <div class="menu-item-icon" v-html="item.icon"></div>
                                    <span class="menu-item-label" :style="{ color: item.color || '' }">{{ item.label }}</span>
                                </div>
                                <svg class="menu-item-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                            </div>
                        </template>

                        <!-- Theme Toggle -->
                        <div class="theme-toggle-item" @click="handleToggleTheme">
                            <div class="toggle-left">
                                <div class="toggle-icon" v-html="themeIcon"></div>
                                <span class="toggle-label">{{ isLightMode ? 'الوضع النهاري' : 'الوضع الليلي' }}</span>
                            </div>
                            <div class="toggle-switch" :class="{ active: isLightMode }"></div>
                        </div>
                    </div>
                </template>

                <!-- ===== عروض الأسعار ===== -->
                <template v-if="activeUserSection === 'user-offers'">
                    <!-- (same offers template - left unchanged) -->
                    <div style="display:flex;align-items:center;gap:10px;padding:16px 16px 4px;">
                        <button @click="activeUserSection = ''" style="background:none;border:none;color:var(--text-white);cursor:pointer;padding:4px;">
                            <span class="material-symbols-outlined" style="font-size:24px;">arrow_forward</span>
                        </button>
                        <div style="flex:1;">
                            <h2 style="color:var(--text-white);font-size:18px;font-weight:700;margin:0 0 2px;">عروض الأسعار</h2>
                            <div style="color:var(--accent-gold);font-size:13px;font-weight:600;">{{ userOffers.length }} عروض متاحة</div>
                        </div>
                    </div>
                    <div style="padding:8px 16px 20px;display:flex;flex-direction:column;gap:12px;">
                        <div v-for="(off, i) in userOffers" :key="i" :id="'offer-' + off.id" style="background:var(--bg-card);border-radius:16px;padding:16px;border:1px solid var(--border-light);transition:all .2s;"
                            :style="off.accepted ? { borderColor:'var(--accent-gold)', background:'rgba(201,162,67,0.06)' } : {}">
                            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
                                <div>
                                    <div style="color:var(--accent-gold);font-size:20px;font-weight:800;">{{ off.price }}</div>
                                    <div style="color:var(--text-muted);font-size:11px;">السعر الإجمالي</div>
                                    <div style="color:#2ecc71;font-size:12px;font-weight:600;margin-top:4px;">مدة التنفيذ: {{ off.duration }}</div>
                                </div>
                                <div style="text-align:left;display:flex;flex-direction:column;align-items:flex-end;">
                                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                                        <span style="color:var(--text-white);font-size:13px;font-weight:700;">{{ off.company }}</span>
                                        <div style="width:36px;height:36px;border-radius:10px;background:var(--bg-input);display:flex;align-items:center;justify-content:center;overflow:hidden;">
                                            <span class="material-symbols-outlined" style="font-size:18px;color:var(--accent-gold);">business</span>
                                        </div>
                                    </div>
                                    <div style="display:flex;align-items:center;gap:4px;margin-top:2px;">
                                        <span style="color:var(--text-light);font-size:10px;">({{ off.reviews }})</span>
                                        <div style="display:flex;">
                                            <span v-for="s in 5" :key="s" class="material-symbols-outlined" :style="{ fontSize:'12px', color:'var(--accent-gold)', opacity: s > off.rating ? 0.3 : 1 }">star</span>
                                        </div>
                                        <span style="color:var(--accent-gold);font-size:11px;font-weight:700;">{{ off.rating }}</span>
                                    </div>
                                    <div style="color:var(--text-light);font-size:11px;margin-top:2px;">{{ off.location }}</div>
                                </div>
                            </div>
                            <div v-if="off.accepted" style="display:flex;align-items:center;gap:6px;margin-bottom:10px;padding:8px 12px;border-radius:8px;background:rgba(46,204,113,0.12);border:1px solid rgba(46,204,113,0.25);">
                                <span class="material-symbols-outlined" style="font-size:18px;color:#2ecc71;">check_circle</span>
                                <span style="color:#2ecc71;font-size:12px;font-weight:700;">تم اختيار هذا العرض</span>
                            </div>
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                                <button @click="viewOfferDetail(off)" style="padding:10px;border-radius:10px;border:1px solid var(--accent-gold);background:transparent;color:var(--accent-gold);font-size:12px;font-weight:700;cursor:pointer;font-family:Cairo,sans-serif;display:flex;align-items:center;justify-content:center;gap:4px;">
                                    <span class="material-symbols-outlined" style="font-size:16px;">visibility</span> عرض التفاصيل
                                </button>
                                <button v-if="!off.accepted" @click="acceptOffer(off)" style="padding:10px;border-radius:10px;border:none;background:var(--accent-gold);color:var(--primary-dark);font-size:12px;font-weight:700;cursor:pointer;font-family:Cairo,sans-serif;display:flex;align-items:center;justify-content:center;gap:4px;">
                                    <span class="material-symbols-outlined" style="font-size:16px;">check</span> اختيار العرض
                                </button>
                                <button v-else disabled style="padding:10px;border-radius:10px;border:none;background:rgba(46,204,113,0.15);color:#2ecc71;font-size:12px;font-weight:700;font-family:Cairo,sans-serif;display:flex;align-items:center;justify-content:center;gap:4px;cursor:default;">
                                    <span class="material-symbols-outlined" style="font-size:16px;">check_circle</span> تم الاختيار
                                </button>
                            </div>
                        </div>
                    </div>
                    <div v-if="selectedOffer" class="notif-overlay" @click.self="selectedOffer = null">
                        <div class="notif-modal" @click.stop style="position:relative;">
                            <button @click="selectedOffer = null" style="position:sticky;top:10px;z-index:20;float:inline-start;width:32px;height:32px;border-radius:50%;border:none;background:var(--bg-input);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:Cairo,sans-serif;">
                                <span class="material-symbols-outlined" style="font-size:16px;">close</span>
                            </button>
                            <div style="padding:20px 16px;text-align:center;border-bottom:1px solid var(--border-light);">
                                <div style="width:48px;height:48px;border-radius:14px;background:var(--accent-gold);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;">
                                    <span class="material-symbols-outlined" style="font-size:24px;color:var(--primary-dark);">request_quote</span>
                                </div>
                                <h3 style="color:var(--text-white);font-size:16px;font-weight:700;margin:0;">عرض جديد</h3>
                                <p style="color:var(--text-muted);font-size:11px;margin:4px 0 0;">{{ selectedOffer.company }}<span v-if="selectedOffer.rating" style="margin-right:6px;"><span style="color:var(--accent-gold);font-weight:600;">{{ selectedOffer.rating }}</span> <span style="color:var(--text-muted);">({{ selectedOffer.reviews }})</span></span></p>
                            </div>
                            <div style="padding:16px;">
                                <div style="background:var(--bg-input);border-radius:12px;padding:14px;margin-bottom:12px;">
                                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                                        <span style="color:var(--text-white);font-size:14px;font-weight:700;">{{ selectedOffer.company }}</span>
                                        <svg width="20" height="20" fill="var(--accent-gold)" viewBox="0 0 24 24"><path d="M19,2L14,6.5V9H10V6L5,10.5V22H9V18H15V22H19V2M7,20V12L10,9.3V11H14V8.3L17,5.6V20H15V16H9V16H7V20Z"/></svg>
                                    </div>
                                    <div style="display:flex;align-items:center;gap:4px;margin-bottom:10px;">
                                        <span v-for="s in 5" :key="s" class="material-symbols-outlined" :style="{ fontSize:'12px', color:'var(--accent-gold)', opacity: s > Math.round(selectedOffer.rating) ? 0.3 : 1 }">star</span>
                                        <span style="color:var(--accent-gold);font-size:12px;font-weight:600;margin-right:4px;">{{ selectedOffer.rating }}</span>
                                        <span style="color:var(--text-muted);font-size:10px;">({{ selectedOffer.reviews }})</span>
                                    </div>
                                    <div style="display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--border-light);">
                                        <span style="color:var(--text-muted);font-size:12px;">السعر الإجمالي</span>
                                        <span style="color:var(--accent-gold);font-size:18px;font-weight:700;">{{ selectedOffer.price }}</span>
                                    </div>
                                    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
                                        <span style="color:var(--text-muted);font-size:12px;">مدة التنفيذ</span>
                                        <span style="color:#4caf50;font-size:13px;font-weight:600;">{{ selectedOffer.duration }}</span>
                                    </div>
                                    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
                                        <span style="color:var(--text-muted);font-size:12px;">الموقع</span>
                                        <span style="color:var(--text-white);font-size:13px;">{{ selectedOffer.location }}</span>
                                    </div>
                                </div>
                                <div v-if="selectedOffer.reply" style="background:rgba(201,162,67,0.08);border:1px solid rgba(201,162,67,0.15);border-radius:10px;padding:12px;margin-bottom:12px;">
                                    <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
                                        <span class="material-symbols-outlined" style="font-size:16px;color:var(--accent-gold);">forum</span>
                                        <span style="color:var(--accent-gold);font-size:12px;font-weight:600;">رد الشركة</span>
                                    </div>
                                    <p style="color:var(--text-white);font-size:13px;line-height:1.7;margin:0;">{{ selectedOffer.reply }}</p>
                                </div>
                                <div v-if="selectedOffer.accepted" style="display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border-radius:10px;background:rgba(46,204,113,0.12);border:1px solid rgba(46,204,113,0.25);margin-bottom:12px;">
                                    <span class="material-symbols-outlined" style="font-size:18px;color:#2ecc71;">check_circle</span>
                                    <span style="color:#2ecc71;font-size:13px;font-weight:700;">تم اختيار هذا العرض</span>
                                </div>
                            </div>
                            <div style="padding:0 16px 16px;display:flex;flex-direction:column;gap:8px;">
                                <a :href="selectedOffer.companyLink || '#'" style="display:block;text-align:center;padding:10px;border-radius:12px;border:1px solid var(--border-light);color:var(--text-white);font-size:13px;font-weight:600;text-decoration:none;font-family:Cairo,sans-serif;">
                                    <span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle;">open_in_new</span> عرض ملف الشركة
                                </a>
                                <button v-if="!selectedOffer.accepted" @click="acceptOffer(selectedOffer)" style="width:100%;padding:10px;border:none;border-radius:12px;background:var(--accent-gold);color:var(--primary-dark);font-size:13px;font-weight:700;font-family:Cairo,sans-serif;cursor:pointer;">
                                    <span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle;">check</span> اختيار هذا العرض
                                </button>
                                <button v-else @click="selectedOffer = null" style="width:100%;padding:10px;border:none;border-radius:12px;background:rgba(46,204,113,0.15);color:#2ecc71;font-size:13px;font-weight:700;font-family:Cairo,sans-serif;cursor:pointer;">
                                    <span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle;">check_circle</span> تم الاختيار
                                </button>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- ===== الدعم الفني ===== -->
                <template v-if="activeUserSection === 'support'">
                    <div style="display:flex;align-items:center;gap:10px;padding:16px 16px 4px;">
                        <button @click="activeUserSection = ''" style="background:none;border:none;color:var(--text-white);cursor:pointer;padding:4px;">
                            <span class="material-symbols-outlined" style="font-size:24px;">arrow_forward</span>
                        </button>
                        <h2 style="color:var(--text-white);font-size:18px;font-weight:700;margin:0;">الدعم الفني</h2>
                    </div>
                    <div style="padding:8px 16px 20px;">
                        <div class="section-card">
                            <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
                                <div style="width:44px;height:44px;border-radius:12px;background:rgba(201,162,67,0.15);display:flex;align-items:center;justify-content:center;">
                                    <span class="material-symbols-outlined" style="font-size:22px;color:var(--accent-gold);">support_agent</span>
                                </div>
                                <div>
                                    <div style="color:var(--text-white);font-size:14px;font-weight:700;">تواصل مع فريق الدعم</div>
                                    <div style="color:var(--text-muted);font-size:11px;">نحن هنا لمساعدتك، اكتب رسالتك وسنرد عليك قريباً</div>
                                </div>
                            </div>
                            <textarea v-model="supportMessage" placeholder="اكتب رسالتك هنا..." rows="5" style="width:100%;padding:12px;border-radius:12px;background:var(--bg-input);border:1px solid var(--border-input);color:var(--text-white);font-size:13px;font-family:Cairo,sans-serif;resize:vertical;box-sizing:border-box;outline:none;"></textarea>
                            <button @click="submitSupport" style="width:100%;padding:12px;margin-top:10px;border:none;border-radius:12px;background:var(--accent-gold);color:var(--primary-dark);font-size:14px;font-weight:700;cursor:pointer;font-family:Cairo,sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;">
                                <span class="material-symbols-outlined" style="font-size:18px;">send</span> إرسال
                            </button>
                        </div>
                    </div>
                </template>

                <!-- ==================== أقسام الشركة (فقط لحساب الشركة) ==================== -->
                <template v-if="isCompany">
                    <!-- ===== طلبات العروض (الواصلة) ===== -->
                    <template v-if="activeUserSection === 'company-quotes'">
                        <div style="display:flex;align-items:center;gap:10px;padding:16px 16px 4px;">
                            <button @click="activeUserSection = ''" style="background:none;border:none;color:var(--text-white);cursor:pointer;padding:4px;">
                                <span class="material-symbols-outlined" style="font-size:24px;">arrow_forward</span>
                            </button>
                            <h2 style="color:var(--text-white);font-size:18px;font-weight:700;margin:0;">طلبات العروض ({{ quoteRequests.length }})</h2>
                        </div>
                        <div style="padding:8px 16px 20px;">
                            <div v-if="quoteRequests.length === 0" style="text-align:center;padding:30px 16px;color:var(--text-muted);font-size:13px;">لا توجد طلبات عروض حتى الآن</div>
                            <div v-for="(qr, i) in quoteRequests" :key="i" class="section-card" style="cursor:pointer;" @click="activeRequest = qr">
                                <div style="display:flex;justify-content:space-between;align-items:center;">
                                    <div>
                                        <div style="color:var(--text-white);font-size:14px;font-weight:600;">{{ qr.name }}</div>
                                        <div style="color:var(--text-muted);font-size:11px;">{{ qr.createdAt }}</div>
                                    </div>
                                    <div v-if="qr.replied" class="status-badge" style="background:rgba(46,204,113,0.1);color:#2ecc71;border:1px solid rgba(46,204,113,0.2);font-size:10px;">تم الرد</div>
                                    <div v-else class="status-badge" style="background:rgba(255,136,0,0.1);color:#FF8800;border:1px solid rgba(255,136,0,0.2);font-size:10px;">جديد</div>
                                </div>
                            </div>
                            <div v-if="activeRequest" class="project-modal" @click.self="activeRequest=null">
                                <div class="modal-content" style="padding-bottom:calc(24px + env(safe-area-inset-bottom));">
                                    <div class="modal-pull-bar"><span></span></div>
                                    <button class="modal-close" @click="activeRequest=null"><span class="material-symbols-outlined close-icon">close</span><span class="material-symbols-outlined arrow-icon">arrow_back</span></button>
                                    <h3 style="color:var(--text-white);font-size:16px;margin:0 0 12px;">تفاصيل الطلب</h3>
                                    <div class="mkt-detail-row"><span class="mkt-detail-label">الاسم</span><span class="mkt-detail-value">{{ activeRequest.name }}</span></div>
                                    <div class="mkt-detail-row"><span class="mkt-detail-label">الهاتف</span><span class="mkt-detail-value">{{ activeRequest.phone }}</span></div>
                                    <div class="mkt-detail-row"><span class="mkt-detail-label">الموقع</span><span class="mkt-detail-value">{{ activeRequest.location }}</span></div>
                                    <div class="mkt-detail-row"><span class="mkt-detail-label">القسم</span><span class="mkt-detail-value">{{ activeRequest.category }}</span></div>
                                    <div class="mkt-detail-row" style="flex-direction:column;align-items:flex-start;gap:4px;">
                                        <span class="mkt-detail-label">التفاصيل</span>
                                        <span class="mkt-detail-value" style="word-break:break-word;line-height:1.7;">{{ activeRequest.details }}</span>
                                    </div>
                                    <div v-if="activeRequest.replyMessage" class="mkt-detail-row" style="flex-direction:column;align-items:flex-start;gap:4px;border-top:1px solid var(--border-light);padding-top:10px;">
                                        <span class="mkt-detail-label" style="color:#2ecc71;">ردك</span>

                            { id: 3, name: 'سعد جاسم', phone: '07801239999', projectName: 'بناء مجمع تجاري', location: 'البصرة', category: 'بناء تجاري', details: 'مجمع تجاري من 3 طوابق بمساحة 1000 متر', createdAt: '2026-06-25', replied: true, replyMessage: 'نشكركم على تواصلكم، يسعدنا تقديم عرض سعر مناسب. يرجى التواصل معنا.' }
                        ]));
                    }
                    if (!localStorage.getItem('bunean-company-quotes') || JSON.parse(localStorage.getItem('bunean-company-quotes')).length === 0) {
                        localStorage.setItem('bunean-company-quotes', JSON.stringify([
                            { id: 1, client: 'عمارة الفيحاء السكنية', project: 'بناء 12 وحدة سكنية', amount: '450,000,000 د.ع', notes: 'يشمل كافة المواد والعمالة، مدة التنفيذ 8 أشهر.', status: 'قيد المراجعة' },
                            { id: 2, client: 'مشروع مول بغداد', project: 'تشطيب واجهات', amount: '125,000,000 د.ع', notes: 'تشطيب واجهات زجاجية وألمنيوم', status: 'مقبول' },
                            { id: 3, client: 'فيلا خاصة - كربلاء', project: 'بناء فيلا', amount: '95,000,000 د.ع', notes: 'عرض سعر أولي قابل للتفاوض', status: 'مرفوض' }
                        ]));
                    }
                    var compProfile = loadFromStorage('bunean-company-profile', {});
                    var changed = false;
                    if (!compProfile.ads || compProfile.ads.length === 0) {
                        compProfile.ads = [
                            { title: 'تشطيبات فاخرة بأسعار منافسة', desc: 'نقدم أفضل خدمات التشطيب بكفاءة عالية', image: 'images/img2.jpg', status: 'قيد المراجعة' },
                            { title: 'بناء فلل وقصور', desc: 'خبرة 15 عاماً في بناء الفلل', image: 'images/img1.jpg', status: 'قيد المراجعة' }
                        ];
                        changed = true;
                    }
                    if (!compProfile.projects || compProfile.projects.length === 0) {
                        compProfile.projects = [
                            { title: 'مجمع السكني النموذجي', desc: 'بناء مجمع سكني متكامل من 50 وحدة', category: 'بناء سكني', image: 'images/img3.jpg', date: '2026-05-15', status: 'مكتمل' },
                            { title: 'مول بغداد الجديد', desc: 'تشطيب واجهات وأعمال داخلية', category: 'بناء تجاري', image: 'images/img4.jpg', date: '2026-03-20', status: 'مكتمل' },
                            { title: 'جسر الزوار', desc: 'أعمال خرسانية وإنشائية', category: 'جسور وطرق', image: 'images/img5.jpg', date: '2026-01-10', status: 'قيد المراجعة' }
                        ];
                        changed = true;
                    }
                    if (changed) localStorage.setItem('bunean-company-profile', JSON.stringify(compProfile));
                })();

                // Quote requests
                var quoteRequests = ref(loadFromStorage('bunean-quote-requests', []));
                var activeRequest = ref(null);
                var replyText = ref('');

                var sendReply = function() {
                    if (!replyText.value.trim()) { showBrandAlert('اكتب الرد أولاً'); return; }
                    var qrs = loadFromStorage('bunean-quote-requests', []);
                    var idx = qrs.findIndex(function(q) { return q.id === activeRequest.value.id; });
                    if (idx !== -1) {
                        qrs[idx].replied = true;
                        qrs[idx].replyMessage = replyText.value.trim();
                        localStorage.setItem('bunean-quote-requests', JSON.stringify(qrs));
                        quoteRequests.value = qrs;
                        activeRequest.value = qrs[idx];
                        replyText.value = '';
                        showBrandAlert('✅ تم إرسال الرد بنجاح');
                    }
                };

                // User quotes (my-quotes)
                var myQuotes = ref(loadFromStorage('bunean-company-quotes', []));

                var getStatusStyle = function(s) {
                    if (s === 'مقبول') return 'background:rgba(46,204,113,0.1);color:#2ecc71;border:1px solid rgba(46,204,113,0.2)';
                    if (s === 'مرفوض') return 'background:rgba(231,76,60,0.1);color:#e74c3c;border:1px solid rgba(231,76,60,0.2)';
                    return 'background:rgba(255,136,0,0.1);color:#FF8800;border:1px solid rgba(255,136,0,0.2)';
                };

                // My Quotes edit
                var selectedMyQuote = ref(null);
                var myQuoteEdit = ref({ client: '', project: '', amount: '', notes: '', status: '' });
                var editMyQuote = function(mq) {
                    selectedMyQuote.value = mq;
                    myQuoteEdit.value = {
                        client: mq.client || '',
                        project: mq.project || '',
                        amount: mq.amount || '',
                        notes: mq.notes || '',
                        status: mq.status || 'قيد المراجعة'
                    };
                };
                var saveMyQuote = function() {
                    var ed = myQuoteEdit.value;
                    if (!ed.client.trim() || !ed.project.trim() || !ed.amount.trim()) { showBrandAlert('املأ الحقول المطلوبة'); return; }
                    var qs = loadFromStorage('bunean-company-quotes', []);
                    var idx = qs.findIndex(function(q) { return q.id === selectedMyQuote.value.id; });
                    if (idx !== -1) {
                        qs[idx].client = ed.client.trim();
                        qs[idx].project = ed.project.trim();
                        qs[idx].amount = ed.amount.trim();
                        qs[idx].notes = ed.notes.trim();
                        qs[idx].status = ed.status;
                        localStorage.setItem('bunean-company-quotes', JSON.stringify(qs));
                        myQuotes.value = qs;
                        selectedMyQuote.value = null;
                        showBrandAlert('✅ تم حفظ التعديلات');
                    }
                };

                // Ads
                var profile = ref(loadFromStorage('bunean-company-profile', { ads: [] }));
                var myAds = ref(profile.value.ads || []);
                var showAdForm = ref(false);
                var newAd = ref({ title: '', desc: '', image: 'images/img1.jpg' });

                var submitAd = function() {
                    if (!newAd.value.title.trim()) { showBrandAlert('أدخل عنوان الإعلان'); return; }
                    myAds.value.push({ title: newAd.value.title, desc: newAd.value.desc, image: newAd.value.image || 'images/img1.jpg', status: 'قيد المراجعة' });
                    var p = loadFromStorage('bunean-company-profile', {});
                    p.ads = myAds.value;
                    localStorage.setItem('bunean-company-profile', JSON.stringify(p));
                    showAdForm.value = false;
                    newAd.value = { title: '', desc: '', image: 'images/img1.jpg' };
                    showBrandAlert('✅ تم إضافة الإعلان\nقيد المراجعة');
                };

                // Projects
                var myProjects = ref(profile.value.projects || []);
                var newProject = ref({ title: '', desc: '', category: '', image: '', date: '' });
                var categories = ['بناء سكني', 'بناء تجاري', 'جسور وطرق', 'تشطيبات', 'خرسانة', 'أعمال صحية', 'أعمال كهربائية', 'دهانات', 'أرضيات', 'واجهات', 'حدائق', 'أخرى'];

                var submitProject = function() {
                    if (!newProject.value.title.trim()) { showBrandAlert('أدخل اسم المشروع'); return; }
                    myProjects.value.push({
                        title: newProject.value.title,
                        desc: newProject.value.desc,
                        category: newProject.value.category,
                        image: newProject.value.image || 'images/img1.jpg',
                        date: newProject.value.date || new Date().toISOString().split('T')[0],
                        status: 'قيد المراجعة'
                    });
                    var p = loadFromStorage('bunean-company-profile', {});
                    p.projects = myProjects.value;
                    localStorage.setItem('bunean-company-profile', JSON.stringify(p));
                    newProject.value = { title: '', desc: '', category: '', image: '', date: '' };
                    showBrandAlert('✅ تم إضافة المشروع\nقيد المراجعة من قبل الدعم الفني');
                };

                // Edit profile
                var editProfile = ref({
                    name: profile.value.name || '',
                    about: profile.value.about || '',
                    specsStr: (profile.value.specs || []).join('\n'),
                    location: profile.value.location || '',
                    phone: profile.value.phone || '',
                    email: profile.value.email || '',
                    logo: profile.value.logo || '',
                    cover: profile.value.cover || '',
                    years: profile.value.years || '',
                    workers: profile.value.workers || '',
                    engineers: profile.value.engineers || '',
                    done: profile.value.done || ''
                });

                var saveProfileEdit = function() {
                    var p = loadFromStorage('bunean-company-profile', {});
                    p.name = editProfile.value.name;
                    p.about = editProfile.value.about;
                    p.specs = editProfile.value.specsStr.split('\n').map(function(s) { return s.trim(); }).filter(Boolean);
                    p.location = editProfile.value.location;
                    p.phone = editProfile.value.phone;
                    p.email = editProfile.value.email;
                    p.logo = editProfile.value.logo;
                    p.cover = editProfile.value.cover;
                    p.years = parseInt(editProfile.value.years) || 0;
                    p.workers = parseInt(editProfile.value.workers) || 0;
                    p.engineers = parseInt(editProfile.value.engineers) || 0;
                    p.done = parseInt(editProfile.value.done) || 0;
                    p.status = 'قيد المراجعة';
                    localStorage.setItem('bunean-company-profile', JSON.stringify(p));
                    showBrandAlert('✅ تم حفظ التعديلات\nقيد المراجعة من قبل الدعم الفني');
                };

                var handleLogout = function() {
                    showBrandConfirm('تسجيل الخروج؟', function() {
                        localStorage.removeItem('bunean-user-auth');
                        localStorage.removeItem('bunean-user-data');
                        window.location.href = 'index.html';
                    });
                };

                // ===== User sections =====
                var activeUserSection = ref('');
                var supportMessage = ref('');

                function submitSupport() {
                    if (!supportMessage.value.trim()) { showBrandAlert('اكتب رسالتك أولاً'); return; }
                    var msgs = JSON.parse(localStorage.getItem('bunean-support-messages') || '[]');
                    msgs.push({ text: supportMessage.value.trim(), date: new Date().toISOString() });
                    localStorage.setItem('bunean-support-messages', JSON.stringify(msgs));
                    supportMessage.value = '';
                    showBrandAlert('✅ تم إرسال رسالتك\nسيتم الرد عليك قريباً');
                }

                // ===== Offers (عروض الأسعار من الشركات) =====
                var userOffers = ref([
                    { id:1, company:'شركة المستقبل للمقاولات', price:'75,000,000 د.ع', duration:'6 أشهر', location:'بابل', rating:4.6, reviews:125, accepted:false, companyLink:'company.html?id=1',
                        reply:'بسم الله الرحمن الرحيم، نحن في شركة المستقبل للمقاولات يسعدنا تقديم عرضنا لمشروعكم. السعر يشمل كافة الأعمال الإنشائية والتشطيبات الأساسية وأعمال الكهرباء والسباكة. مدة التنفيذ 6 أشهر من تاريخ التوقيع. نضمن جودة العمل والالتزام بالمواصفات المتفق عليها.' },
                    { id:2, company:'شركة البناء الذكي', price:'82,500,000 د.ع', duration:'6 أشهر', location:'بابل', rating:4.4, reviews:95, accepted:false, companyLink:'company.html?id=2',
                        reply:'نشكركم على ثقتكم بشركة البناء الذكي. نقدم لكم عرضاً بقيمة 82,500,000 د.ع يشمل التصميم والتنفيذ والإشراف الهندسي. مدة التنفيذ 6 أشهر مع ضمان لمدة 5 سنوات على الأعمال.' },
                    { id:3, company:'شركة دار الإنجاز', price:'87,000,000 د.ع', duration:'7 أشهر', location:'النجف', rating:4.5, reviews:110, accepted:false, companyLink:'company.html?id=3',
                        reply:'شركة دار الإنجاز تقدم عرضها التنافسي لمشروعكم. يتضمن العرض الأعمال الهيكلية والتشطيبات الداخلية والخارجية. خبرتنا في المجال تضمن لكم أفضل النتائج بأعلى جودة.' },
                    { id:4, company:'شركة الإعمار الحديث', price:'92,000,000 د.ع', duration:'7 أشهر', location:'النجف', rating:4.3, reviews:76, accepted:false, companyLink:'company.html?id=4',
                        reply:'عرضنا يشمل تنفيذ المشروع حسب المخططات المقدمة مع توفير كافة المواد. نتميز بفريق هندسي متكامل وخبرة تتجاوز 15 عاماً في مجال المقاولات.' },
                    { id:5, company:'شركة النخبة للمقاولات', price:'95,500,000 د.ع', duration:'8 أشهر', location:'الحلة', rating:4.7, reviews:142, accepted:false, companyLink:'company.html?id=5',
                        reply:'يسر شركة النخبة للمقاولات أن تقدم لكم أفضل عروضها. نعدكم بالالتزام بأعلى معايير الجودة والمواصفات المطلوبة مع أفضل فريق عمل. عرضنا يشمل كافة التفاصيل المذكورة.' },
                ]);
                var selectedOffer = ref(null);

                function viewOfferDetail(off) {
                    selectedOffer.value = off;
                }

                function acceptOffer(off) {
                    if (!off.accepted) {
                        showBrandConfirm('هل أنت متأكد من اختيار هذا العرض؟', function() {
                            off.accepted = true;
                            var accepted = JSON.parse(localStorage.getItem('bunean-accepted-offers') || '[]');
                            if (accepted.indexOf(off.id) === -1) {
                                accepted.push(off.id);
                                localStorage.setItem('bunean-accepted-offers', JSON.stringify(accepted));
                            }
                            selectedOffer.value = null;
                            showBrandAlert('✅ تم اختيار العرض بنجاح');
                        });
                    }
                }

                // Load persisted accepted states
                (function loadAccepted() {
                    var accepted = JSON.parse(localStorage.getItem('bunean-accepted-offers') || '[]');
                    userOffers.value.forEach(function(o) {
                        if (accepted.indexOf(o.id) !== -1) o.accepted = true;
                    });
                })();

                // Handle URL params (navigation from notifications)
                (function() {
                    var params = new URLSearchParams(window.location.search);
                    var section = params.get('section');
                    var offerId = params.get('offerId');
                    if (section === 'user-offers' && offerId) {
                        activeUserSection.value = 'user-offers';
                        var off = userOffers.value.find(function(o) { return o.id === parseInt(offerId); });
                        if (off) {
                            setTimeout(function() {
                                selectedOffer.value = off;
                                var el = document.getElementById('offer-' + off.id);
                                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            }, 400);
                        }
                    }
                })();

                return {
                    user, menuItems, isCompany, isLightMode, themeIcon, handleToggleTheme,
                    companyStatus,
                    quoteRequests, activeRequest, replyText, sendReply,
                    myQuotes, getStatusStyle,
                    myAds, showAdForm, newAd, submitAd,
                    myProjects, newProject, submitProject, categories,
                    editProfile, saveProfileEdit, handleLogout,
                    activeUserSection, userOffers, selectedOffer, viewOfferDetail, acceptOffer,
                    supportMessage, submitSupport
                };
            }
        }).mount('#app');
    </script>
    <script>
        initFloatingCart();
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(function() { console.log('SW registered'); })
                .catch(function(err) { console.log('SW registration failed'); });
        }
    </script>
